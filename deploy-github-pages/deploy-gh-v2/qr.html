<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EV Charge Finder QR</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    main {
      width: min(94vw, 480px);
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    img {
      width: min(72vw, 320px);
      height: min(72vw, 320px);
      border: 1px solid #cbd5e1;
      border-radius: 8px;
    }
    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    button {
      background: #0d9488;
      color: #ffffff;
      border: 1px solid #0d9488;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 12px;
    }
    p {
      color: #475569;
      word-break: break-all;
      margin: 8px 0 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>QR for your phone</h1>
    <p>Scan with Samsung camera to open the app.</p>
    <input id="url-input" type="text">
    <button id="generate-btn" type="button">Generate QR</button>
    <img id="qr-image" alt="QR code for EV Charge Finder link">
    <p id="url-label"></p>
  </main>
  <script>
    const input = document.getElementById("url-input");
    const image = document.getElementById("qr-image");
    const label = document.getElementById("url-label");
    const button = document.getElementById("generate-btn");

    const params = new URLSearchParams(window.location.search);
    const host = window.location.hostname.toLowerCase();
    const isLocalHost = host === "localhost" || host === "127.0.0.1" || host === "::1";
    const inferredUrl = isLocalHost ? "" : (window.location.origin + "/index.html");
    const defaultUrl = params.get("url") || inferredUrl;
    input.value = defaultUrl;

    function renderQr() {
      const target = input.value.trim();
      if (!/^https?:\/\/.+/i.test(target)) {
        image.removeAttribute("src");
        label.textContent = "Enter a full LAN URL, for example: http://192.168.0.176:8080/index.html";
        return;
      }
      const encoded = encodeURIComponent(target);
      image.src = "https://api.qrserver.com/v1/create-qr-code/?size=360x360&data=" + encoded;
      label.textContent = target;
    }

    button.addEventListener("click", renderQr);
    if (!defaultUrl) {
      label.textContent = "Paste LAN URL from serve.ps1 output, then click Generate QR.";
    }
    renderQr();
  </script>
</body>
</html>
